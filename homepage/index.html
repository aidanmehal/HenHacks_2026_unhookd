<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>unhookd - Security Awareness Extension</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Bubble Background -->
  <div class="bubble-background" id="bubbleBackground"></div>
No data is stored or shared. © unhookd 2026
  <!-- Main -->
  <main>
    <!-- Hero -->
    <section class="hero">
      <div class="logo-container">
        <img src="webimages/logo-with-text.png" alt="unhookd" />
      </div>
      <h1>Stay protected from cyber threats with real time ai threat detection.</h1>
      <button class="button">Go Phishing</button>
    </section>
  </main>

  <!-- Footer -->
  <footer>
    <p>&copy; 2026 unhookd. Protecting users, one click at a time.</p>
  </footer>

  <script>
    // Generate animated bubbles
    const bubbleBackground = document.getElementById('bubbleBackground');
    
    function createBubble() {
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      
      const size = Math.random() * 100 + 20;
      const leftPosition = Math.random() * 100;
      const duration = Math.random() * 10 + 8;
      const delay = Math.random() * 5;
      
      bubble.style.width = size + 'px';
      bubble.style.height = size + 'px';
      bubble.style.left = leftPosition + '%';
      bubble.style.animationDuration = duration + 's';
      bubble.style.animationDelay = delay + 's';
      
      bubbleBackground.appendChild(bubble);
      
      setTimeout(() => bubble.remove(), (duration + delay) * 1000);
    }
    
    // Create bubbles continuously
    setInterval(createBubble, 500);
    
    // Initial bubbles
    for (let i = 0; i < 5; i++) {
      createBubble();
    }
  </script>
</body>
</html>
